# ─── DDoS Protection Zones ────────────────────────────────────────────────────
# Define rate limiting zones in the http block (add these to your http context
# if using a standalone nginx.conf, or they go above the server block)

limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=20r/m;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── DDoS: Connection & Timeout Limits ────────────────────────────────────
    limit_conn conn_limit 20;           # max 20 simultaneous connections per IP
    client_body_timeout 10s;            # drop slow-body attacks
    client_header_timeout 10s;          # drop slow-header attacks
    keepalive_timeout 30s;              # don't hold idle connections too long
    send_timeout 10s;                   # drop stalled response sends
    client_max_body_size 1m;            # match backend 1MiB limit
    client_body_buffer_size 16k;        # buffer before spilling to disk
    large_client_header_buffers 4 8k;   # limit oversized headers

    # ─── DDoS: Block Common Attack Patterns ───────────────────────────────────
    # Block empty User-Agent (most bots/scanners skip it)
    if ($http_user_agent = "") {
        return 444;                     # 444 = nginx drops connection silently
    }

    # Block common vulnerability scanners and bad bots
    if ($http_user_agent ~* (nikto|sqlmap|nmap|masscan|zgrab|nuclei|dirbuster|hydra)) {
        return 444;
    }

    # ─── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=10 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ─── API: Rate limited more strictly ──────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=15 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # ─── DDoS: Proxy buffer tuning ────────────────────────────────────────
        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_buffer_size 32k;
    }

    # ─── Auth endpoints: strictest rate limit ─────────────────────────────────
    # /api/auth/login and /api/auth/register are brute-force targets
    location ~* ^/api/auth/(login|register|refresh) {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Block direct access to sensitive paths ───────────────────────────────
    location ~* \.(env|git|sql|log|bak|conf|sh)$ {
        return 404;
    }

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                   always;
    add_header X-Frame-Options         "DENY"                      always;
    add_header Referrer-Policy         "no-referrer"               always;
    add_header X-XSS-Protection        "1; mode=block"             always;
    add_header Permissions-Policy      "geolocation=(), camera=()" always;

    # ─── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}